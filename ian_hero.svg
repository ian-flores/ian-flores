<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/>
    <line x1="450" y1="0" x2="450" y2="380"/>
    <line x1="600" y1="0" x2="600" y2="380"/>
    <line x1="750" y1="0" x2="750" y2="380"/>
  </g>

  <!-- Agent graph nodes (decorative, right side) -->
  <!-- Node connections -->
  <g stroke="#30363d" stroke-width="1.5" fill="none">
    <path d="M 680,100 Q 720,140 760,120"/>
    <path d="M 680,100 Q 660,160 700,190"/>
    <path d="M 760,120 Q 780,170 760,200"/>
    <path d="M 700,190 Q 730,210 760,200"/>
    <path d="M 700,190 Q 680,240 720,270"/>
    <path d="M 760,200 Q 770,240 750,270"/>
    <path d="M 720,270 Q 740,280 750,270"/>
    <path d="M 750,270 Q 790,300 820,290"/>
    <path d="M 720,270 Q 700,310 730,330"/>
  </g>

  <!-- Nodes -->
  <g>
    <circle cx="680" cy="100" r="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="760" cy="120" r="5" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="700" cy="190" r="7" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
    <circle cx="760" cy="200" r="5" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="720" cy="270" r="6" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
    <circle cx="750" cy="270" r="4" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="820" cy="290" r="4" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="730" cy="330" r="5" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  </g>

  <!-- Pulsing center node -->
  <circle cx="700" cy="190" r="12" fill="none" stroke="#bc8cff" stroke-width="0.5" opacity="0.3"/>
  <circle cx="700" cy="190" r="18" fill="none" stroke="#bc8cff" stroke-width="0.3" opacity="0.15"/>

  <!-- Accent line -->
  <rect x="60" y="85" width="50" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Main text -->
  <text x="60" y="140" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace" font-size="42" font-weight="700" fill="#e6edf3" letter-spacing="-1">Ian Flores Siaca</text>

  <!-- Subtitle -->
  <text x="60" y="178" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace" font-size="16" fill="#8b949e" letter-spacing="0.5">Building secure AI agent infrastructure</text>

  <!-- Tech tags -->
  <g font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace" font-size="13">
    <rect x="60" y="210" width="28" height="26" rx="6" fill="url(#accent2)" stroke="#30363d" stroke-width="0.5"/>
    <text x="74" y="228" fill="#58a6ff" text-anchor="middle">R</text>

    <rect x="98" y="210" width="65" height="26" rx="6" fill="url(#accent2)" stroke="#30363d" stroke-width="0.5"/>
    <text x="130" y="228" fill="#58a6ff" text-anchor="middle">Python</text>

    <rect x="173" y="210" width="38" height="26" rx="6" fill="url(#accent2)" stroke="#30363d" stroke-width="0.5"/>
    <text x="192" y="228" fill="#58a6ff" text-anchor="middle">Go</text>

    <rect x="221" y="210" width="88" height="26" rx="6" fill="url(#accent2)" stroke="#30363d" stroke-width="0.5"/>
    <text x="265" y="228" fill="#58a6ff" text-anchor="middle">TypeScript</text>
  </g>

  <!-- Packages -->
  <g font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace" font-size="12.5" fill="#8b949e">
    <text x="62" y="276"><tspan fill="#6e7681">$</tspan> orchestr <tspan fill="#484f58">·</tspan> securer <tspan fill="#484f58">·</tspan> securetools <tspan fill="#484f58">·</tspan> securetrace</text>
    <text x="62" y="300"><tspan fill="#6e7681">$</tspan> secureguard <tspan fill="#484f58">·</tspan> securebench <tspan fill="#484f58">·</tspan> securecontext</text>
    <text x="62" y="324"><tspan fill="#6e7681">$</tspan> pedanticran</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="60" y="350" width="35" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- PR flag subtle -->
  <text x="845" y="365" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace" font-size="20" fill="#8b949e" text-anchor="end" opacity="0.4">🇵🇷</text>
</svg>
